name: pages

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "assets/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install librsvg (SVG → PNG)
        run: sudo apt-get update && sudo apt-get install -y librsvg2-bin

      - name: Stage site
        run: |
          mkdir -p _site/assets
          cp -R docs/. _site/
          cp -R assets/. _site/assets/

      - name: Render PNGs from SVG (logo + OG card)
        run: |
          rsvg-convert -w 512  -h 512  _site/assets/logo-linkedin.svg -o _site/assets/logo-linkedin.png
          rsvg-convert -w 1200 -h 1200 _site/assets/logo-linkedin.svg -o _site/assets/og.png
          rsvg-convert -w 256  -h 256  _site/assets/logo.svg          -o _site/assets/logo.png
          rsvg-convert -w 32   -h 32   _site/assets/logo.svg          -o _site/assets/favicon-32.png

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
