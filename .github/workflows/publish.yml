name: publish

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write   # required for PyPI trusted publishing

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build
        run: python -m pip install --upgrade pip build
      - name: Build distributions
        run: python -m build
      - name: Check distributions
        run: |
          python -m pip install twine
          python -m twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  pypi:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/duox/
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      # Configure trusted publishing on PyPI: org `AbteeX AI Labs`,
      # project `duox`, GitHub repo `aimaghsoodi/duo`, workflow `publish.yml`,
      # environment `pypi`. No PYPI_API_TOKEN needed once set up.
      - uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" dist/* \
            --title "DuoX ${GITHUB_REF_NAME}" \
            --generate-notes

  huggingface-space:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "HF_TOKEN secret not set — skipping Space push."
            exit 0
          fi
          python -m pip install --upgrade huggingface_hub
          python - <<'PY'
          import os, shutil, tempfile, subprocess, pathlib
          from huggingface_hub import HfApi, create_repo
          repo = "AbteeX-AI-Labs/duox"
          create_repo(repo, repo_type="space", space_sdk="gradio",
                      token=os.environ["HF_TOKEN"], exist_ok=True)
          api = HfApi(token=os.environ["HF_TOKEN"])
          with tempfile.TemporaryDirectory() as tmp:
              root = pathlib.Path(tmp)
              shutil.copy("app.py", root / "app.py")
              shutil.copy("huggingface/README.md", root / "README.md")
              shutil.copy("huggingface/requirements.txt", root / "requirements.txt")
              api.upload_folder(folder_path=str(root), repo_id=repo,
                                repo_type="space",
                                commit_message=f"deploy {os.environ.get('GITHUB_REF_NAME','')}")
          PY
